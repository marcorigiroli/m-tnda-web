<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Tienda - Blanqueamiento Dental</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #dfe9f3, #ffffff);
}

.whatsapp-float{
      position:fixed;
      right:18px;
      bottom:18px;
      width:58px;
      height:58px;
      border-radius:50%;
      background:#25d366;
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      text-decoration:none;
      font-size:30px;
      box-shadow:0 12px 28px rgba(0,0,0,.2);
      z-index:999;
      animation:floaty 2.4s ease-in-out infinite;
    }

/* CONTENEDOR */
.container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

/* CARD PRODUCTO */
.card {
    background: white;
    width: 350px;
    border-radius: 20px;
    box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    overflow: hidden;
    transition: 0.3s;
    cursor: pointer;
}

.card:hover {
    transform: translateY(-10px) scale(1.02);
}

/* IMAGEN */
.card img {
    width: 100%;
    height: 220px;
    object-fit: cover;
}

/* TEXTO */
.card-content {
    padding: 20px;
    text-align: center;
}

.card h1 {
    margin: 10px 0;
    font-size: 22px;
}

.price {
    color: black;
    font-size: 26px;
    font-weight: bold;
}

/* DETALLE (segunda pantalla) */
.detail {
    display: none;
    padding: 40px;
    text-align: center;
}

.detail img {
    width: 80%;
    max-width: 400px;
    border-radius: 15px;
    margin: 10px;
}

/* BOTÓN */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 15px 25px;
    background: linear-gradient(135deg, #009ee3, #007bb8);
    color: white;
    font-size: 18px;
    border-radius: 10px;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.05);
    background: linear-gradient(135deg, #007bb8, #005f8a);
}

/* BOTÓN VOLVER */
.back {
    margin-top: 20px;
    display: block;
    color: #555;
    cursor: pointer;
}
</style>

</head>
<body>

<!-- PANTALLA PRINCIPAL -->
<div class="container" id="home">
    <div class="card" onclick="verProducto()">
        <img src="chajaas.jpg">
        <div class="card-content">
            <h1>Tiras Blanqueadoras Dentales</h1>
            <p>Tiras Blanqueadoras de Dientes 5D, 14 unidades - Libre Peroxido ✨</p>
            <div class="price">$13.999</div>
        </div>
    </div>
</div>

<!-- PANTALLA DETALLE -->
<div class="detail" id="detalle">
    <h1>Tiras Blanqueadoras Dentales</h1>

    <img src="kk.jpg">
    <img src="chajaas.jpg">
    <img src="tiras-blanqueadoras-mercadona.jpg">

    <p>✔ Blanqueamiento seguro en 7 días<br>
       ✔ Fácil de usar<br>
       ✔ Resultados rápidos desde el primer uso</p>

    <a class="btn" href="https://mpago.la/32YvHbr" target="_blank">
        Comprar ahora
    </a>

    <span class="back" onclick="volver()">← Volver</span>
</div>

<script>
function verProducto() {
    document.getElementById("home").style.display = "none";
    document.getElementById("detalle").style.display = "block";
}

function volver() {
    document.getElementById("detalle").style.display = "none";
    document.getElementById("home").style.display = "flex";
}
</script>
<a class="whatsapp-float" href="https://wa.me/5491161126422" target="_blank">💬</a>
</body>
</html>
